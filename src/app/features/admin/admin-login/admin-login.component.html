<div class="login">
  <div class="login__card">
    <div class="login__brand">
      <span class="login__mark" aria-hidden="true">🍽️</span>
      <span class="login__name">{{ 'nav.brand' | translate }}</span>
    </div>

    <h1 class="login__title">{{ 'admin.login.title' | translate }}</h1>
    <p class="login__subtitle">{{ 'admin.login.subtitle' | translate }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      @if (error()) {
        <p class="login__error" role="alert">
          <span aria-hidden="true">⚠</span> {{ errorKey() | translate }}
        </p>
      }

      <div class="field">
        <label class="field__label" for="admin-email">{{ 'admin.login.email' | translate }}</label>
        <input
          id="admin-email"
          type="email"
          class="field__control"
          formControlName="email"
          autocomplete="username"
          inputmode="email"
          required
        />
      </div>

      <div class="field">
        <label class="field__label" for="admin-password">
          {{ 'admin.login.password' | translate }}
        </label>
        <input
          id="admin-password"
          type="password"
          class="field__control"
          formControlName="password"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn--primary btn--block"
        [disabled]="submitting()"
      >
        {{ (submitting() ? 'admin.login.submitting' : 'admin.login.submit') | translate }}
      </button>

      <!-- Réinitialisation : envoie un courriel à l'adresse saisie ci-dessus. -->
      <button
        type="button"
        class="login__forgot"
        [disabled]="sendingReset()"
        (click)="forgotPassword()"
      >
        {{ (sendingReset() ? 'admin.login.resetSending' : 'admin.login.forgot') | translate }}
      </button>
    </form>

    <a class="login__back" routerLink="/">← {{ 'admin.login.backToSite' | translate }}</a>
  </div>
</div>
